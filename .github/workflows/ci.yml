name: CI

# Quality gate: runs on every PR and on pushes to main.
# Complements the Oxygen deploy workflow — this fails the PR if code doesn't
# type-check, lint, format, satisfy the dependency rules, or build.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check · Lint · Format · Deps · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm prettier:check

      - name: Dependency rules
        run: pnpm depcruise

      - name: Build
        run: pnpm build
